<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LingCDN 控制台</title>
    <style>
      :root {
        --boot-bg: #F5F7F9;
        --boot-text: #909399;
        --boot-accent: #409EFF;
      }
      html, body { margin: 0; padding: 0; height: 100%; background: var(--boot-bg); }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
      #app:empty + #app-boot,
      #app-boot { display: flex; }
      #app:not(:empty) + #app-boot { display: none; }
      #app-boot {
        position: fixed;
        inset: 0;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: var(--boot-bg);
        color: var(--boot-text);
        z-index: 9999;
      }
      .boot-spinner {
        width: 28px;
        height: 28px;
        border: 2px solid #D8DCE3;
        border-top-color: var(--boot-accent);
        border-radius: 50%;
        animation: bootSpin 0.7s linear infinite;
      }
      .boot-title { font-size: 14px; font-weight: 500; color: #334155; }
      .boot-subtitle { font-size: 12px; color: var(--boot-text); }
      @keyframes bootSpin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        .boot-spinner { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="app-boot" aria-live="polite" role="status">
      <div class="boot-spinner" aria-hidden="true"></div>
      <div class="boot-title" id="boot-title">控制台</div>
      <div class="boot-subtitle">正在加载…</div>
    </div>
    <script>
      (function () {
        try {
          var name = localStorage.getItem("lingcdn:system-name")
          if (name) {
            var el = document.getElementById("boot-title")
            if (el) el.textContent = name + " 控制台"
            document.title = name + " 控制台"
          }
        } catch (_) { /* ignore */ }
      })()
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
