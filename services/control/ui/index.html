<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LingCDN 控制台</title>
    <style>
      :root {
        --boot-brand: #635BFF;
        --boot-brand-strong: #4D44E0;
        --boot-bg: #FAFAFA;
        --boot-text: #6E6E6E;
      }
      html, body { margin: 0; padding: 0; height: 100%; background: var(--boot-bg); }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
      #app:empty + #app-boot,
      #app-boot { display: flex; }
      #app:not(:empty) + #app-boot { display: none; }
      #app-boot {
        position: fixed;
        inset: 0;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background:
          radial-gradient(1200px 600px at 20% -10%, rgba(99,91,255,0.10), transparent 60%),
          radial-gradient(900px 500px at 110% 110%, rgba(99,91,255,0.10), transparent 55%),
          var(--boot-bg);
        color: var(--boot-text);
        z-index: 9999;
      }
      .boot-stage { position: relative; width: 96px; height: 96px; display: flex; align-items: center; justify-content: center; }
      .boot-orbit { position: absolute; inset: 0; border-radius: 50%; border: 1px solid rgba(99,91,255,0.22); animation: bootPulse 2.4s ease-in-out infinite; }
      .boot-orbit.mid { inset: 12px; border-color: rgba(99,91,255,0.18); animation-delay: .4s; }
      .boot-orbit.inner { inset: 24px; border-color: rgba(99,91,255,0.14); animation-delay: .8s; }
      .boot-arc { position: absolute; inset: 0; width: 100%; height: 100%; animation: bootSpin 1.4s linear infinite; filter: drop-shadow(0 4px 14px rgba(99,91,255,0.18)); }
      .boot-core { position: relative; width: 22px; height: 22px; border-radius: 50%; background: linear-gradient(135deg, var(--boot-brand), var(--boot-brand-strong)); box-shadow: 0 6px 18px rgba(99,91,255,0.35); }
      .boot-core::before, .boot-core::after { content: ""; position: absolute; inset: 0; border-radius: 50%; background: var(--boot-brand); opacity: .35; animation: bootCore 1.8s ease-out infinite; }
      .boot-core::after { animation-delay: .9s; }
      .boot-caption { display: flex; align-items: baseline; gap: 6px; font-size: 14px; font-weight: 500; }
      .boot-title { background: linear-gradient(135deg, var(--boot-brand), var(--boot-brand-strong)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 600; }
      .boot-dots { display: inline-flex; gap: 3px; }
      .boot-dots i { width: 4px; height: 4px; border-radius: 50%; background: var(--boot-brand); opacity: .4; animation: bootDot 1.2s ease-in-out infinite; }
      .boot-dots i:nth-child(2) { animation-delay: .15s; }
      .boot-dots i:nth-child(3) { animation-delay: .3s; }
      .boot-subtitle { font-size: 12px; opacity: .85; }
      @keyframes bootSpin { to { transform: rotate(360deg); } }
      @keyframes bootPulse { 0%,100% { transform: scale(1); opacity: .45; } 50% { transform: scale(1.08); opacity: .85; } }
      @keyframes bootCore { 0% { transform: scale(.6); opacity: .55; } 100% { transform: scale(2.4); opacity: 0; } }
      @keyframes bootDot { 0%,80%,100% { opacity: .3; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-3px); } }
      @media (prefers-reduced-motion: reduce) {
        .boot-orbit, .boot-arc, .boot-core::before, .boot-core::after, .boot-dots i { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="app-boot" aria-live="polite" role="status">
      <div class="boot-stage">
        <div class="boot-orbit"></div>
        <div class="boot-orbit mid"></div>
        <div class="boot-orbit inner"></div>
        <svg class="boot-arc" viewBox="0 0 80 80" aria-hidden="true">
          <defs>
            <linearGradient id="bootArc" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#635BFF" stop-opacity="0" />
              <stop offset="60%" stop-color="#635BFF" stop-opacity="0.7" />
              <stop offset="100%" stop-color="#4D44E0" />
            </linearGradient>
          </defs>
          <circle cx="40" cy="40" r="32" fill="none" stroke="url(#bootArc)" stroke-width="3" stroke-linecap="round" stroke-dasharray="120 80" />
        </svg>
        <div class="boot-core"></div>
      </div>
      <div class="boot-caption">
        <span class="boot-title" id="boot-title">控制台</span>
        <span class="boot-dots" aria-hidden="true"><i></i><i></i><i></i></span>
      </div>
      <div class="boot-subtitle">正在加载资源…</div>
    </div>
    <script>
      (function () {
        try {
          var name = localStorage.getItem("lingcdn:system-name")
          if (name) {
            var el = document.getElementById("boot-title")
            if (el) el.textContent = name + " 控制台"
            document.title = name + " 控制台"
          }
        } catch (_) { /* ignore */ }
      })()
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
